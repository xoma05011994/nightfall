<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NIGHTFALL // survivor-2d</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #1c1310;
        --blood: #8b0000;
        --blood-bright: #c81e1e;
        --bone: #d8cfc2;
        --sickly: #6fae4a;
        --panel: #120a0a;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: var(--bg);
        overflow: hidden;
        font-family: "Georgia", "Times New Roman", serif;
        color: var(--bone);
      }
      #app {
        position: relative;
        width: 100vw;
        height: 100vh;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: var(--bg);
        cursor:
          url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32'><line x1='16' y1='2' x2='16' y2='12' stroke='%23c81e1e' stroke-width='2'/><line x1='16' y1='20' x2='16' y2='30' stroke='%23c81e1e' stroke-width='2'/><line x1='2' y1='16' x2='12' y2='16' stroke='%23c81e1e' stroke-width='2'/><line x1='20' y1='16' x2='30' y2='16' stroke='%23c81e1e' stroke-width='2'/><circle cx='16' cy='16' r='3' fill='none' stroke='%23c81e1e' stroke-width='1.5'/></svg>")
            16 16,
          crosshair;
      }
      #ui-root {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }
      #ui-root button {
        pointer-events: auto;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="game-canvas"></canvas>
      <div id="ui-root"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
